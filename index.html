<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<title>Viewer — Suivi Produits Amazon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2a2a4a;--text:#e0e0e0;--muted:#888;--accent:#c084fc;--orange:#ff9900;--green:#22c55e;--red:#ef4444;--yellow:#fbbf24;--pink:#f472b6;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1rem}
.container{max-width:1100px;margin:0 auto}
h1{font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--orange),#ff6b6b,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
.subtitle{color:var(--muted);margin-top:.25rem;font-size:.95rem;text-align:center}
.stats-bar{display:flex;gap:.8rem;justify-content:center;margin:1.5rem;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1.5rem;text-align:center;min-width:100px}
.stat-card .num{font-size:1.8rem;font-weight:700}
.stat-card .lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.toolbar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.toolbar button{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem 1rem;cursor:pointer;font-size:.85rem;transition:.15s}
.toolbar button:hover{background:var(--border)}
.toolbar input{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem 1rem;font-size:.85rem;flex:1;min-width:140px}
.toolbar input::placeholder{color:var(--muted)}
.actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.actions button{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.5rem 1rem;cursor:pointer;color:var(--text);font-size:.85rem}
.actions button:hover{background:var(--border)}
.actions .add-btn{background:var(--orange);color:#000;border-color:var(--orange);font-weight:600}
.actions .add-btn:hover{opacity:.9}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;font-size:.85rem}
th,td{padding:.6rem .8rem;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--border);color:var(--text);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0}
td input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--green)}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.7rem;font-weight:600}
.badge.pending{background:var(--yellow);color:#000}
.badge.done{background:var(--green);color:#000}
.badge.late{background:var(--red);color:#fff}
.badge.waiting{background:var(--pink);color:#fff}
.card-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem}
.card h3{font-size:1rem;margin-bottom:.3rem;color:var(--orange)}
.card .meta{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.card .field-row{display:flex;align-items:center;justify-content:space-between;padding:.25rem 0;font-size:.8rem}
.card .field-row label{flex:1}
.card .badge{margin-left:.5rem}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:.85rem}
.msg{padding:.8rem;text-align:center;color:var(--muted);font-style:italic}
.view-toggle{display:flex;gap:0;margin-bottom:1rem}
.view-toggle button{padding:.5rem 1.2rem;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:.8rem}
.view-toggle button:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.view-toggle button:last-child{border-radius:0 var(--radius) var(--radius) 0}
.view-toggle button.active{background:var(--border);font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>Viewer</h1>
  <p class="subtitle">Suivi des produits Amazon a tester</p>

  <div class="stats-bar" id="stats">
    <div class="stat-card"><div class="num" id="s-total">0</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num" id="s-pending">0</div><div class="lbl">En attente</div></div>
    <div class="stat-card"><div class="num" id="s-commented">0</div><div class="lbl">Commente</div></div>
    <div class="stat-card"><div class="num" id="s-refund">0</div><div class="lbl">Rembourse</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Rechercher un produit..." oninput="render()" />
    <button onclick="sortMode=(sortMode+1)%3;render()" id="sort-btn">Commande</button>
  </div>

  <div class="actions">
    <button class="add-btn" id="addBtn">+ Ajouter un produit</button>
    <button onclick="switchView()" id="viewBtn">Vue cartes</button>
  </div>

  <div class="view-toggle" id="viewToggle">
    <button class="active" onclick="setView('table')">Tableau</button>
    <button onclick="setView('cards')">Cartes</button>
  </div>

  <div id="main-view"><p class="msg">Chargement...</p></div>
</div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;max-width:400px;width:90%">
    <h2 style="margin-bottom:1rem;font-size:1rem">Ajouter un produit</h2>
    <div style="display:flex;flex-direction:column;gap:.8rem">
      <input id="f-name" placeholder="Nom du produit" style="padding:.5rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)" />
      <input id="f-order" type="date" style="padding:.5rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)" />
      <input id="f-received" type="date" style="padding:.5rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)" />
      <input id="f-deadline" type="date" style="padding:.5rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)" />
    </div>
    <div style="display:flex;gap:.5rem;margin-top:1rem">
      <button onclick="addProduct()" style="flex:1;background:var(--orange);color:#000;border:none;border-radius:6px;padding:.5rem;cursor:pointer;font-weight:600">Ajouter</button>
      <button onclick="closeModal()" style="flex:1;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.5rem;cursor:pointer">Annuler</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://supabase.sagetech.vip';
const SUPABASE_KEY='eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3ODc4NTIwMCwiZXhwIjo0OTM0NDU4ODAwLCJyb2xlIjoic2VydmljZV9yb2xlIn0.iDaEfe4pHMzkeff9Cu8c-YjwDAes5NY75oPD1oVmuIk';
const FILE='viewer-data/products.json';
let pg=[], view='table', sortMode=0, q='';
let cur=[];

function api(path,m){
  return fetch(SUPABASE_URL+path,{method:m||'GET',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'}}).then(r=>r.json());
}

async function load(){
  try{
    const d=await api('/storage/v1/object/'+FILE);
    if(Array.isArray(d)){pg=d;saveLocal();}
  }catch(e){}
  const ls=localStorage.getItem('viewer_pg');
  if(ls) try{const p=JSON.parse(ls);if(p.length>=pg.length) pg=p;}catch(e){}
  render();
}

function saveLocal(){try{localStorage.setItem('viewer_pg',JSON.stringify(pg))}catch(e){}}

async function save(){
  try{
    const token=localStorage.getItem('supabase_token');
    const h={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
    if(token) h['Authorization']='Bearer '+token;
    const r=await fetch(SUPABASE_URL+'/storage/v1/object/'+FILE,{method:'PUT',headers:h,body:JSON.stringify(pg)});
    if(!r.ok&&r.status===401&&!token){
      const u=await api('/auth/v1/signup',{email:'test@test.com',password:'test123!'});
      if(u.access_token){localStorage.setItem('supabase_token',u.access_token);return save();}
    }
    if(!r.ok&&r.status===401&&token){localStorage.removeItem('supabase_token');return save();}
    saveLocal();
  }catch(e){console.error('save err',e);}
}

function getBadge(x){
  if(x.refundPaid) return {c:'done',l:'Rembourse'};
  if(x.commentPosted) return {c:'waiting',l:'En attente remb.'};
  if(!x.deadline) return {c:'pending',l:'En cours'};
  const d=new Date(x.deadline),t=new Date();
  return d<t?{c:'late',l:'En retard'}:{c:'pending',l:'En cours'};
}

function daysLeft(d){
  if(!d) return '';
  const t=new Date(d)-new Date();
  const n=Math.ceil(t/86400000);
  if(n<0) return 'J-'+Math.abs(n);
  if(n===0) return "Aujourd'hui";
  return 'J-'+n;
}

function render(){
  q=document.getElementById('search').value.toLowerCase();
  const fl=pg.filter(x=>x.name.toLowerCase().includes(q));
  fl.sort((a,b)=>{
    if(sortMode===1) return new Date(a.deadline||'2099')-new Date(b.deadline||'2099');
    if(sortMode===2) return new Date(b.deadline||'2000')-new Date(a.deadline||'2000');
    return new Date(b.orderDate)-new Date(a.orderDate);
  });
  const sortLabels=['Commande','Deadline','Deadline'];
  document.getElementById('sort-btn').textContent=sortLabels[sortMode]+[' \u2191',' \u2191',' \u2193'][sortMode];
  document.getElementById('s-total').textContent=pg.length;
  document.getElementById('s-pending').textContent=pg.filter(x=>!x.commentPosted&&!x.refundPaid).length;
  document.getElementById('s-commented').textContent=pg.filter(x=>x.commentPosted).length;
  document.getElementById('s-refund').textContent=pg.filter(x=>x.refundPaid).length;
  cur=fl;
  if(view==='table') renderTable(fl);
  else renderCards(fl);
  document.getElementById('main-view').style.display='block';
}

function esc(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTable(fl){
  if(!fl.length){document.getElementById('main-view').innerHTML='<p class="msg">Aucun produit</p>';return;}
  const rows=fl.map(x=>{
    const b=getBadge(x);
    const dl=x.deadline?x.deadline+'<br><span style="font-size:.7rem">'+daysLeft(x.deadline)+'</span>':'-';
    const names=esc(x.name);
    return '<tr>'+
      '<td><strong>'+names+'</strong></td>'+
      '<td style="font-size:.8rem;color:var(--muted)">'+(x.orderDate||'-')+'</td>'+
      '<td style="font-size:.8rem;color:var(--muted)">'+(x.receivedDate||'-')+'</td>'+
      '<td>'+dl+'</td>'+
      '<td><span class="badge '+b.c+'">'+b.l+'</span></td>'+
      '<td style="text-align:center"><input type="checkbox"'+(x.commentPosted?' checked':'')+' onchange="toggleField('+x.id+','commentPosted')"></td>'+
      '<td style="text-align:center"><input type="checkbox"'+(x.refundPaid?' checked':'')+' onchange="toggleField('+x.id+','refundPaid')"></td>'+
      '<td><button class="del-btn" onclick="del('+x.id+')">'+String.fromCharCode(10005)+'</button></td>'+
    '</tr>';
  }).join('');
  document.getElementById('main-view').innerHTML='<table><thead><tr><th>Produit</th><th>Commande</th><th>Recu</th><th>Deadline</th><th>Statut</th><th>Commente</th><th>Rembourse</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderCards(fl){
  if(!fl.length){document.getElementById('main-view').innerHTML='<p class="msg">Aucun produit</p>';return;}
  const cards=fl.map(x=>{
    const b=getBadge(x);
    const names=esc(x.name);
    const meta='Commande: '+(x.orderDate||'-')+' | Recu: '+(x.receivedDate||'-');
    const dl='Deadline: '+(x.deadline?'<strong>'+x.deadline+'</strong> '+daysLeft(x.deadline):'-');
    return '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:start">'+
        '<h3>'+names+'</h3>'+
        '<button class="del-btn" onclick="del('+x.id+')">'+String.fromCharCode(10005)+'</button>'+
      '</div>'+
      '<div class="meta">'+meta+'</div>'+
      '<div class="meta">'+dl+'</div>'+
      '<div class="field-row">'+
        '<label>Commentaire poste</label>'+
        '<input type="checkbox"'+(x.commentPosted?' checked':'')+' onchange="toggleField('+x.id+','commentPosted')">'+
      '</div>'+
      '<div class="field-row">'+
        '<label>Remboursement recu</label>'+
        '<input type="checkbox"'+(x.refundPaid?' checked':'')+' onchange="toggleField('+x.id+','refundPaid')">'+
        '<span class="badge '+b.c+'">'+b.l+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('main-view').innerHTML='<div class="card-view">'+cards+'</div>';
}

function toggleField(id,field){
  const idx=pg.findIndex(x=>x.id===id);
  if(idx===-1) return;
  pg[idx][field]=!pg[idx][field];
  save();
  render();
}

async function del(id){
  if(!confirm('Supprimer ce produit ?')) return;
  pg=pg.filter(x=>x.id!==id);
  await save();
  render();
}

function switchView(){
  view=view==='table'?'cards':'table';
  document.getElementById('viewBtn').textContent=view==='table'?'Vue cartes':'Vue tableau';
  document.querySelectorAll('.view-toggle button').forEach((b,i)=>b.classList.toggle('active',(i===0&&view==='table')||(i===1&&view==='cards')));
  render();
}

function setView(v){if(v!==view)switchView();}

function openModal(){document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';}

async function addProduct(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Nom requis');return;}
  const order=document.getElementById('f-order').value;
  const received=document.getElementById('f-received').value;
  const deadline=document.getElementById('f-deadline').value;
  const id=Date.now();
  pg.push({id:id,name:name,orderDate:order,receivedDate:received,deadline:deadline,commentPosted:false,refundPaid:false});
  document.getElementById('f-name').value='';
  document.getElementById('f-order').value='';
  document.getElementById('f-received').value='';
  document.getElementById('f-deadline').value='';
  closeModal();
  await save();
  render();
}

document.getElementById('addBtn').onclick=openModal;
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
load();
</script>
</body>
</html>
