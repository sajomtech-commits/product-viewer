<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer — Suivi Produits Amazon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9900, #ff6b6b, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #888;
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }
        .stats-bar {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            text-align: center;
            min-width: 120px;
        }
        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ff9900;
        }
        .stat-card .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table-wrapper {
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            overflow: hidden;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px;
        }
        thead {
            background: linear-gradient(135deg, #1e1e3a, #2a1a3a);
        }
        th {
            padding: 1rem 1.2rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #c084fc;
            white-space: nowrap;
        }
        td {
            padding: 0.9rem 1.2rem;
            border-top: 1px solid #2a2a4a;
            font-size: 0.95rem;
        }
        tr:hover td {
            background: rgba(192, 132, 252, 0.05);
        }
        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-ok { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-pending { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-urgent { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .btn {
            padding: 0.35rem 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-edit { background: #2a2a4a; color: #c084fc; }
        .btn-delete { background: rgba(239,68,68,0.15); color: #ef4444; }
        .btn-primary {
            background: linear-gradient(135deg, #c084fc, #ff9900);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .add-form {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        .add-form.visible { display: block; }
        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 180px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #c084fc;
        }
        .form-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #666;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #555;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            h1 { font-size: 1.8rem; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Viewer</h1>
            <p class="subtitle">Suivi des produits Amazon — commandes, réceptions & commentaires</p>
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="number" id="totalCount">0</div>
                    <div class="label">Produits</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="pendingCount">0</div>
                    <div class="label">En attente</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="urgentCount">0</div>
                    <div class="label">Urgents 🔴</div>
                </div>
            </div>
        </header>

        <button class="btn-primary" onclick="toggleForm()">＋ Ajouter un produit</button>

        <div class="add-form" id="addForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Produit</label>
                    <input type="text" id="inputProduct" placeholder="Ex: Écouteurs Bluetooth XYZ">
                </div>
                <div class="form-group">
                    <label>Date commande</label>
                    <input type="date" id="inputOrdered">
                </div>
                <div class="form-group">
                    <label>Date réception</label>
                    <input type="date" id="inputReceived">
                </div>
                <div class="form-group">
                    <label>Date limite commentaire</label>
                    <input type="date" id="inputDeadline">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn-primary" onclick="addProduct()">✅ Enregistrer</button>
                <button class="btn" style="background:#333;color:#999;" onclick="toggleForm()">Annuler</button>
            </div>
        </div>

        <div style="margin-top:1.5rem;" class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Produit</th>
                        <th>📦 Date commande</th>
                        <th>📬 Date réception</th>
                        <th>⏰ Date limite</th>
                        <th>Statut</th>
                        <th style="text-align:center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
        </div>
        <div class="footer">
            🛡️ Données stockées localement dans votre navigateur · <span id="updateDate"></span>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'amazon_viewer_products';

        function getProducts() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveProducts(products) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
            render();
        }

        function toggleForm() {
            document.getElementById('addForm').classList.toggle('visible');
        }

        function addProduct() {
            const product = document.getElementById('inputProduct').value.trim();
            const ordered = document.getElementById('inputOrdered').value;
            const received = document.getElementById('inputReceived').value;
            const deadline = document.getElementById('inputDeadline').value;

            if (!product || !ordered || !deadline) {
                alert('❌ Produit, date commande et date limite sont requis');
                return;
            }

            const products = getProducts();
            products.push({
                id: Date.now(),
                product,
                ordered,
                received,
                deadline,
                created: new Date().toISOString()
            });
            saveProducts(products);

            // Reset form
            document.getElementById('inputProduct').value = '';
            document.getElementById('inputOrdered').value = '';
            document.getElementById('inputReceived').value = '';
            document.getElementById('inputDeadline').value = '';
            toggleForm();
        }

        function deleteProduct(id) {
            if (!confirm('Supprimer ce produit ?')) return;
            const products = getProducts().filter(p => p.id !== id);
            saveProducts(products);
        }

        function getStatus(deadline, received) {
            if (!deadline) return { label: '⚠️ Incomplet', cls: 'status-urgent' };
            const today = new Date();
            today.setHours(0,0,0,0);
            const dl = new Date(deadline + 'T23:59:59');

            if (received) return { label: '✅ Commenté', cls: 'status-ok' };
            if (dl < today) return { label: '🔴 Urgent', cls: 'status-urgent' };
            const diffDays = Math.ceil((dl - today) / (1000*60*60*24));
            if (diffDays <= 3) return { label: '🟡 Dans ' + diffDays + 'j', cls: 'status-urgent' };
            return { label: '⏳ ' + diffDays + 'j restants', cls: 'status-pending' };
        }

        function formatDate(d) {
            if (!d) return '—';
            const parts = d.split('-');
            return parts[2] + '/' + parts[1] + '/' + parts[0];
        }

        function render() {
            const products = getProducts();
            const tbody = document.getElementById('productTableBody');

            document.getElementById('totalCount').textContent = products.length;
            document.getElementById('pendingCount').textContent = products.filter(p => !p.received).length;
            const today = new Date(); today.setHours(0,0,0,0);
            document.getElementById('urgentCount').textContent = products.filter(p => {
                if (p.received) return false;
                if (!p.deadline) return true;
                return new Date(p.deadline + 'T23:59:59') < today;
            }).length;

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📦</div>Aucun produit pour le moment.<br>Cliquez sur "＋ Ajouter un produit" pour commencer.</div></td></tr>';
                return;
            }

            tbody.innerHTML = products.sort((a,b) => new Date(b.deadline||'2099') - new Date(a.deadline||'2099')).map(p => {
                const status = getStatus(p.deadline, p.received);
                return `<tr>
                    <td><strong>${p.product}</strong></td>
                    <td>${formatDate(p.ordered)}</td>
                    <td>${formatDate(p.received)}</td>
                    <td>${formatDate(p.deadline)}</td>
                    <td><span class="status-badge ${status.cls}">${status.label}</span></td>
                    <td style="text-align:center;">
                        <button class="btn btn-delete" onclick="deleteProduct(${p.id})">🗑️</button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('updateDate').textContent = 'Dernière mise à jour : ' + new Date().toLocaleDateString('fr-FR', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
        }

        render();
    </script>
</body>
</html>
